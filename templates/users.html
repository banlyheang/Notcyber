<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - L@ZY SHOP Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { transition: background-color 0.3s; }
        body.dark-mode { background-color: #1a1a2e; color: #eee; }
        body.dark-mode .main-content { background-color: #16213e; }
        body.dark-mode .user-card, body.dark-mode .navbar-top { background-color: #0f3460; color: #eee; border: 1px solid #1a1a2e; }
        .sidebar {
            position: fixed; left: 0; top: 0; height: 100vh; width: 260px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;
        }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-nav { padding: 20px 0; }
        .sidebar-nav .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; margin: 5px 15px; border-radius: 10px; transition: all 0.3s; }
        .sidebar-nav .nav-link:hover, .sidebar-nav .nav-link.active { background: rgba(255,255,255,0.2); transform: translateX(5px); }
        .main-content { margin-left: 260px; padding: 20px; background: #f5f7fb; min-height: 100vh; transition: background-color 0.3s; }
        .user-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; cursor: pointer; transition: all 0.3s; }
        .user-card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .navbar-top { background: white; border-radius: 12px; padding: 15px 20px; margin-bottom: 20px; }
        .theme-toggle { cursor: pointer; padding: 8px 15px; border-radius: 20px; background: #f0f0f0; transition: all 0.3s; }
        body.dark-mode .theme-toggle { background: #0f3460; color: #ffd700; }
        .status-badge { padding: 3px 8px; border-radius: 20px; font-size: 11px; }
        .status-active { background: #28a745; color: white; }
        .status-blocked { background: #dc3545; color: white; }
        .avatar-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #f0f0f0; }
        body.dark-mode .avatar-img { background: #1a1a2e; }
        @media (max-width: 768px) { .sidebar { margin-left: -260px; } .main-content { margin-left: 0; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            {% if logo %}<img src="{{ logo }}" style="width:50px;border-radius:10px">{% else %}<i class="bi bi-shop fs-1"></i>{% endif %}
            <h4 class="mt-2">L@ZY SHOP</h4>
            <small>Admin Dashboard</small>
        </div>
        <div class="sidebar-nav">
            <nav class="nav flex-column">
                <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a class="nav-link" href="/products"><i class="bi bi-box"></i> Products</a>
                <a class="nav-link" href="/orders"><i class="bi bi-cart"></i> Orders</a>
                <a class="nav-link active" href="/users"><i class="bi bi-people"></i> Users</a>
                <a class="nav-link" href="/analytics"><i class="bi bi-graph-up"></i> Analytics</a>
                <a class="nav-link" href="/reports"><i class="bi bi-file-text"></i> Reports</a>
                <a class="nav-link" href="/settings"><i class="bi bi-gear"></i> Settings</a>
                <hr><a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
            </nav>
        </div>
    </div>
    
    <div class="main-content">
        <div class="navbar-top d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h4 class="mb-0"><i class="bi bi-people"></i> User Management</h4>
            <div class="d-flex gap-3 align-items-center">
                <input type="text" class="form-control" id="searchInput" placeholder="Search users..." style="width: 250px;">
                <div class="theme-toggle" onclick="toggleTheme()"><i class="bi bi-moon-stars"></i> <span id="themeText">Dark Mode</span></div>
            </div>
        </div>
        <div class="row" id="usersGrid"><div class="text-center py-5"><div class="spinner-border text-primary"></div></div></div>
        <nav><ul class="pagination justify-content-center" id="pagination"></ul></nav>
    </div>
    
    <script>
        let currentPage = 1, currentSearch = '';
        
        function setTheme(theme){
            if(theme === 'dark'){
                document.body.classList.add('dark-mode');
                document.getElementById('themeText').innerHTML = 'Light Mode';
                localStorage.setItem('theme', 'dark');
                fetch('/api/set-theme', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({theme:'dark'})});
            } else {
                document.body.classList.remove('dark-mode');
                document.getElementById('themeText').innerHTML = 'Dark Mode';
                localStorage.setItem('theme', 'light');
                fetch('/api/set-theme', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({theme:'light'})});
            }
        }
        
        function toggleTheme(){ setTheme(document.body.classList.contains('dark-mode') ? 'light' : 'dark'); }
        const savedTheme = localStorage.getItem('theme') || 'light'; setTheme(savedTheme);
        
        function getAvatarHtml(user){
            if(user.avatar_url){
                return `<img src="${user.avatar_url}" class="avatar-img" onerror="this.src='https://ui-avatars.com/api/?background=667eea&color=fff&bold=true&size=50&name=${encodeURIComponent(user.first_name || 'User')}'">`;
            }
            return `<div class="avatar-img d-flex align-items-center justify-content-center" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white;"><i class="bi bi-person fs-4"></i></div>`;
        }
        
        function loadUsers(){
            let url = `/api/users?page=${currentPage}`;
            if(currentSearch) url += `&search=${encodeURIComponent(currentSearch)}`;
            fetch(url).then(r=>r.json()).then(data=>{
                const grid = document.getElementById('usersGrid'); grid.innerHTML='';
                if(data.users && data.users.length>0){
                    data.users.forEach(user=>{
                        const statusClass = user.is_blocked ? 'status-blocked' : 'status-active';
                        const statusText = user.is_blocked ? 'Blocked' : 'Active';
                        grid.innerHTML += `
                            <div class="col-md-6 col-lg-4">
                                <div class="user-card" onclick="viewUser(${user.user_id})">
                                    <div class="d-flex">
                                        <div class="me-3">${getAvatarHtml(user)}</div>
                                        <div class="flex-grow-1">
                                            <div class="d-flex justify-content-between">
                                                <h6 class="mb-1">${escapeHtml(user.first_name || 'User')}</h6>
                                                <span class="status-badge ${statusClass}">${statusText}</span>
                                            </div>
                                            <small class="text-muted">@${escapeHtml(user.username || 'No username')}</small>
                                            <div class="mt-2 small">
                                                <div><i class="bi bi-telephone"></i> ${user.phone || 'No phone'}</div>
                                                <div><i class="bi bi-cart"></i> Orders: ${user.total_orders || 0}</div>
                                                <div><i class="bi bi-currency-dollar"></i> Spent: $${(user.total_spent || 0).toFixed(2)}</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>`;
                    });
                } else {
                    grid.innerHTML = '<div class="col-12 text-center py-5"><i class="bi bi-inbox fs-1"></i><p class="mt-2">No users found</p></div>';
                }
                
                // Pagination
                const pagination = document.getElementById('pagination'); pagination.innerHTML='';
                if(data.total_pages > 1){
                    if(data.page > 1) pagination.innerHTML += `<li class="page-item"><a class="page-link" onclick="goToPage(${data.page-1})">Previous</a></li>`;
                    for(let i=1; i<=Math.min(data.total_pages,5); i++){
                        pagination.innerHTML += `<li class="page-item ${i===data.page?'active':''}"><a class="page-link" onclick="goToPage(${i})">${i}</a></li>`;
                    }
                    if(data.page < data.total_pages) pagination.innerHTML += `<li class="page-item"><a class="page-link" onclick="goToPage(${data.page+1})">Next</a></li>`;
                }
            });
        }
        
        function viewUser(userId){ window.location.href = `/users/detail?id=${userId}`; }
        function goToPage(page){ currentPage = page; loadUsers(); }
        function escapeHtml(text){ if(!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', function(e){
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => { currentSearch = e.target.value; currentPage = 1; loadUsers(); }, 500);
        });
        
        loadUsers();
    </script>
</body>
</html>
